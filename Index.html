<style>
/* ── Harry Potter–inspired fonts: UnifrakturMaguntia for display, IM Fell for body ── */
@import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;500;600;700&family=IM+Fell+English:ital@0;1&family=Space+Mono:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  /* ── Deep cosmic cobalt — midnight navy, like the image ── */
  --bg:   #010812;
  --bg1:  #010d1a;
  --bg2:  #021120;
  --bg3:  #031828;
  --bg4:  #052030;

  /* borders — electric cyan, barely there */
  --b0:   rgba(0,180,220,0.06);
  --b1:   rgba(0,180,220,0.13);
  --b2:   rgba(0,180,220,0.26);

  /* text — icy cyan-white, high contrast */
  --t0:   #e8f6fc;
  --t1:   rgba(195,232,248,0.88);
  --t2:   rgba(150,210,235,0.72);

  /* electric cyan accent scale */
  --v0:   #020e20;
  --v1:   #031830;
  --v2:   #052848;
  --v3:   #083c68;
  --v4:   #1a82c4;
  --v5:   #2aaee8;
  --v6:   #70d8f8;
  --vd:   rgba(5,40,72,0.14);
  --vd2:  rgba(8,60,104,0.22);
  --vg:   rgba(42,174,232,0.32);

  /* core flame — icy cyan-white from the image */
  --flame:  #78e8ff;
  --flame2: #c0f4ff;
  --flameg: rgba(120,232,255,0.28);

  --hi:   #1490d8;
  --hid:  rgba(20,144,216,0.12);
}

html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--t0);
  font-family:'IM Fell English',Georgia,serif;
  min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;
}

/* ── NEBULA CANVAS — covers full page background ── */
#nebula-canvas{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  width:100%;height:100%;
}

/* ── HERO NEBULA GLOW — the column of light from the image ── */
.hero-nebula{
  position:absolute;
  left:50%;top:-60px;
  transform:translateX(-50%);
  width:260px;height:460px;
  pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80px 200px at 50% 60%, rgba(0,200,255,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 140px 300px at 50% 55%, rgba(0,140,220,0.10) 0%, transparent 70%),
    radial-gradient(ellipse 200px 400px at 50% 50%, rgba(0,80,160,0.07) 0%, transparent 70%);
  animation:nebulaPulse 8s ease-in-out infinite;
}
@keyframes nebulaPulse{
  0%,100%{opacity:.75;transform:translateX(-50%) scaleY(1)}
  50%     {opacity:1;  transform:translateX(-50%) scaleY(1.04)}
}


/* ══════════════════════════════════════════════
   HEADER
══════════════════════════════════════════════ */
.hdr{
  position:sticky;top:0;z-index:200;
  background:rgba(1,0,10,.95);
  backdrop-filter:blur(32px);
  border-bottom:1px solid var(--b0);
  padding:6px 18px;
  display:flex;align-items:center;justify-content:space-between;
  animation:slideDown .7s cubic-bezier(.34,1.2,.64,1);
  overflow:visible;
}
@keyframes slideDown{from{transform:translateY(-110%);opacity:0}to{transform:translateY(0);opacity:1}}

.logo{display:flex;align-items:center;gap:6px;cursor:default;user-select:none;position:relative}
.logo-text{display:flex;flex-direction:column;align-items:center;}

.hdr-center{
  position:absolute;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;
  pointer-events:none;
}
@keyframes levitate{
  0%   {transform:translateY(0px)  rotate(0deg);   filter:drop-shadow(0 0 3px rgba(20,144,216,.34)) drop-shadow(0 0 1px rgba(120,232,255,.20))}
  20%  {transform:translateY(-2px) rotate(.2deg);  filter:drop-shadow(0 0 5px rgba(20,144,216,.46)) drop-shadow(0 0 2px rgba(120,232,255,.28))}
  50%  {transform:translateY(-6px) rotate(0deg);   filter:drop-shadow(0 0 10px rgba(20,144,216,.62)) drop-shadow(0 0 4px rgba(120,232,255,.38))}
  75%  {transform:translateY(-4px) rotate(-.2deg); filter:drop-shadow(0 0 6px rgba(20,144,216,.46)) drop-shadow(0 0 2px rgba(120,232,255,.24))}
  100% {transform:translateY(0px)  rotate(0deg);   filter:drop-shadow(0 0 3px rgba(20,144,216,.34)) drop-shadow(0 0 1px rgba(120,232,255,.20))}
}
/* ════════════════════════════════════════
   FLAME — realistic filled fire, slow sway
════════════════════════════════════════ */

/* Core body — the main tongue of fire, sways gently */
@keyframes flameSway{
  0%   {transform:rotate(-1.5deg) translateY(0px)   scaleX(1.00)}
  18%  {transform:rotate( 1.2deg) translateY(-1px)  scaleX(0.96)}
  35%  {transform:rotate(-0.8deg) translateY(-2px)  scaleX(1.03)}
  52%  {transform:rotate( 1.8deg) translateY(-1px)  scaleX(0.97)}
  70%  {transform:rotate(-1.2deg) translateY(-2px)  scaleX(1.02)}
  85%  {transform:rotate( 0.6deg) translateY(-1px)  scaleX(0.98)}
  100% {transform:rotate(-1.5deg) translateY(0px)   scaleX(1.00)}
}
/* Side wisps — lean more, breathe independently */
@keyframes flameWispL{
  0%   {transform:rotate(-4deg)  translateY(0px)  opacity:.72}
  22%  {transform:rotate( 2deg)  translateY(-2px) opacity:.88}
  44%  {transform:rotate(-6deg)  translateY(-3px) opacity:.60}
  66%  {transform:rotate( 1deg)  translateY(-1px) opacity:.80}
  88%  {transform:rotate(-5deg)  translateY(-2px) opacity:.65}
  100% {transform:rotate(-4deg)  translateY(0px)  opacity:.72}
}
@keyframes flameWispR{
  0%   {transform:rotate( 4deg)  translateY(0px)  opacity:.68}
  25%  {transform:rotate(-1deg)  translateY(-2px) opacity:.84}
  48%  {transform:rotate( 5deg)  translateY(-3px) opacity:.55}
  70%  {transform:rotate(-2deg)  translateY(-1px) opacity:.76}
  90%  {transform:rotate( 3deg)  translateY(-2px) opacity:.62}
  100% {transform:rotate( 4deg)  translateY(0px)  opacity:.68}
}
/* Tip breath — the apex flickers independently */
@keyframes flameTip{
  0%,100%{transform:translateY(0)   scaleY(1.00);opacity:.55}
  30%    {transform:translateY(-3px) scaleY(1.10);opacity:.75}
  60%    {transform:translateY(-1px) scaleY(0.92);opacity:.45}
  80%    {transform:translateY(-2px) scaleY(1.05);opacity:.65}
}
/* Inner bright core — pulsing glow */
@keyframes flameCore{
  0%,100%{opacity:.70}
  40%    {opacity:.92}
  70%    {opacity:.60}
}

/* assign animations — slow, organic */
.fb {transform-origin:50% 100%;animation:flameSway  9s  ease-in-out infinite}
.fwl{transform-origin:50% 100%;animation:flameWispL 11s ease-in-out infinite 1.4s}
.fwr{transform-origin:50% 100%;animation:flameWispR 10s ease-in-out infinite 0.7s}
.ft {transform-origin:50% 100%;animation:flameTip   7s  ease-in-out infinite 0.3s}
.fc {animation:flameCore 5s ease-in-out infinite}

/* header small flames — same but slightly faster */
.cf1{transform-origin:50% 100%;animation:flameSway  8s ease-in-out infinite}
.cf2{transform-origin:50% 100%;animation:flameWispL 9s ease-in-out infinite 0.8s}


/* ASH name */
.logo-name{
  font-family:'Cinzel Decorative',serif;
  font-size:14px;letter-spacing:3px;font-weight:700;
  background:linear-gradient(130deg,var(--v1) 0%,var(--v5) 38%,var(--v6) 55%,var(--v4) 72%,var(--v1) 100%);
  background-size:320% 100%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:violetShimmer 18s linear infinite;
  line-height:1;position:relative;z-index:1;
}
@keyframes violetShimmer{
  0%  {background-position:320% 0}
  100%{background-position:-320% 0}
}

.logo-sub{
  font-family:'Space Mono',monospace;font-size:5.5px;letter-spacing:2px;
  color:var(--t1);text-transform:uppercase;line-height:1;margin-top:2px;
  position:relative;z-index:1;
}

.hdr-center{
  position:absolute;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:14px;
  pointer-events:auto;
}

/* ── MAGIC CRYSTAL BALL ── */
.magic-ball-wrap{
  display:flex;flex-direction:column;align-items:center;gap:1px;
  cursor:pointer;
  animation:orbFloat 7s ease-in-out infinite;
  filter:drop-shadow(0 0 6px rgba(42,174,232,0.38)) drop-shadow(0 0 2px rgba(120,232,255,0.20));
  transition:filter .3s, transform .2s;
}
.magic-ball-wrap:hover{
  filter:drop-shadow(0 0 12px rgba(120,232,255,0.65)) drop-shadow(0 0 5px rgba(192,244,255,0.38));
  transform:scale(1.10);
}
.magic-ball-wrap:active{ transform:scale(.94); }
#ball-canvas{
  width:34px;height:34px;
  border-radius:50%;
  display:block;
}
.ball-lbl{
  font-family:'Cinzel',serif;font-size:5.5px;letter-spacing:1px;
  color:rgba(120,232,255,0.52);text-transform:uppercase;white-space:nowrap;
}
@keyframes orbFloat{
  0%,100%{transform:translateY(0)}
  50%    {transform:translateY(-5px)}
}

/* ── BALL OVERLAY — full-screen crystal ball view ── */
.ball-overlay{
  position:fixed;inset:0;z-index:600;
  background:rgba(1,0,10,.96);backdrop-filter:blur(20px);
  opacity:0;pointer-events:none;
  transition:opacity .32s ease;
  display:flex;align-items:flex-start;justify-content:center;
  overflow-y:auto;
}
.ball-overlay.open{opacity:1;pointer-events:all;}
.ball-modal{
  position:relative;
  width:100%;max-width:480px;
  background:var(--bg1);
  border-left:1px solid var(--b1);border-right:1px solid var(--b1);
  min-height:100vh;padding-bottom:80px;
  transform:translateY(26px);
  transition:transform .4s cubic-bezier(.34,1.1,.64,1);
}
.ball-overlay.open .ball-modal{transform:translateY(0);}
.ball-close{
  position:absolute;top:16px;right:18px;
  width:32px;height:32px;border-radius:8px;
  background:rgba(42,174,232,0.10);border:1px solid rgba(120,232,255,0.22);
  color:var(--t1);font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.ball-close:hover{background:rgba(42,174,232,0.20);color:var(--t0);}

.ball-modal-header{
  display:flex;flex-direction:column;align-items:center;
  padding:40px 24px 24px;
  border-bottom:1px solid rgba(120,232,255,0.08);
}
#ball-modal-canvas{
  width:110px;height:110px;border-radius:50%;
  margin-bottom:14px;
  filter:drop-shadow(0 0 22px rgba(42,174,232,0.55)) drop-shadow(0 0 8px rgba(120,232,255,0.30));
  animation:orbFloat 7s ease-in-out infinite;
}
.ball-modal-title{
  font-family:'Cinzel Decorative',serif;font-size:18px;font-weight:700;
  letter-spacing:2px;
  background:linear-gradient(130deg,var(--v3) 0%,var(--v6) 48%,var(--v4) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:4px;
}
.ball-modal-sub{
  font-family:'IM Fell English',serif;font-size:12px;
  font-style:italic;color:var(--t1);
}

.ball-counters{
  display:grid;grid-template-columns:1fr 1px 1fr;
  padding:24px 16px;gap:0;
}
.ball-divider{
  background:linear-gradient(180deg,transparent,rgba(120,232,255,0.18),transparent);
  width:1px;align-self:stretch;margin:20px 0;
}
.ball-counter{
  display:flex;flex-direction:column;align-items:center;
  padding:0 12px;gap:2px;
}
.bc-icon{
  font-size:16px;color:var(--v6);margin-bottom:4px;
  text-shadow:0 0 10px var(--vg);
}
.bc-value{
  font-family:'Cinzel',serif;font-size:32px;font-weight:700;
  color:var(--t0);line-height:1;letter-spacing:-1px;
}
.bc-unit{
  font-family:'Cinzel',serif;font-size:13px;color:var(--v5);
  margin-top:1px;margin-bottom:4px;
}
.bc-label{
  font-family:'IM Fell English',serif;font-size:11px;
  font-style:italic;color:var(--t1);margin-bottom:10px;text-align:center;
}
.bc-ring-wrap{
  position:relative;width:80px;height:80px;margin-bottom:14px;
}
.bc-ring{width:80px;height:80px;transform:rotate(-90deg);}
.bc-ring-bg{
  fill:none;stroke:rgba(120,232,255,0.08);stroke-width:5;
}
.bc-ring-fill{
  fill:none;
  stroke:url(#bcWealthGrad);
  stroke-width:5;stroke-linecap:round;
  transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);
}
.bc-ring-health{ stroke:url(#bcHealthGrad); }
.bc-rows{
  display:flex;flex-direction:column;gap:7px;width:100%;
}
.bc-row{display:flex;align-items:center;gap:5px;}
.bc-row-lbl{
  font-family:'IM Fell English',serif;font-size:9.5px;
  color:var(--t1);flex:1;font-style:italic;
}
.bc-row-bar-wrap{
  width:50px;height:3px;background:rgba(120,232,255,0.10);
  border-radius:2px;overflow:hidden;
}
.bc-row-bar{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,var(--v3),var(--v6));
  box-shadow:0 0 4px var(--vg);
  transition:width 1s cubic-bezier(.4,0,.2,1);
}
.bc-row-bar.health-bar{background:linear-gradient(90deg,#1a9c6e,#48f0b0);}
.bc-row-val{
  font-family:'Space Mono',monospace;font-size:8px;
  color:var(--v5);white-space:nowrap;min-width:36px;text-align:right;
}

/* SVG gradient defs injected inline */
#bc-svg-defs{position:absolute;width:0;height:0;overflow:hidden;}

/* cozy overrides */
body.cozy .magic-ball-wrap{
  filter:drop-shadow(0 0 10px rgba(180,100,20,0.45)) drop-shadow(0 0 4px rgba(220,160,60,0.30));
}
body.cozy .magic-ball-wrap:hover{
  filter:drop-shadow(0 0 20px rgba(200,130,40,0.65)) drop-shadow(0 0 8px rgba(240,190,80,0.40));
}
body.cozy .ball-lbl{color:rgba(140,80,20,0.60);}
body.cozy .ball-overlay{background:rgba(240,231,210,0.97);}
body.cozy .ball-modal-header{border-bottom-color:rgba(140,80,20,0.10);}
body.cozy .ball-close{
  background:rgba(180,100,20,0.10);border-color:rgba(140,80,20,0.25);
}
body.cozy #ball-modal-canvas{
  filter:drop-shadow(0 0 22px rgba(200,130,40,0.50)) drop-shadow(0 0 8px rgba(220,170,60,0.30));
}
body.cozy .ball-divider{
  background:linear-gradient(180deg,transparent,rgba(140,80,20,0.20),transparent);
}
body.cozy .bc-ring-bg{stroke:rgba(140,80,20,0.12);}
body.cozy .bc-row-bar-wrap{background:rgba(140,80,20,0.10);}
body.cozy .bc-row-bar{background:linear-gradient(90deg,var(--v2),var(--v5));}
body.cozy .bc-row-bar.health-bar{background:linear-gradient(90deg,#8b6200,#d4a020);}

/* ── SCROLL BUTTON ── */
.hdr-right{display:flex;align-items:center;}
.scroll-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  cursor:pointer;transition:all .22s;
  -webkit-tap-highlight-color:transparent;
}
.scroll-btn:hover .scroll-svg{filter:drop-shadow(0 0 10px rgba(120,232,255,0.55)) drop-shadow(0 0 4px rgba(192,244,255,0.35));}
.scroll-btn:active{transform:scale(.94);}
.scroll-svg{
  width:28px;height:42px;
  filter:drop-shadow(0 0 5px rgba(120,232,255,0.28)) drop-shadow(0 0 2px rgba(72,200,240,0.18));
  transition:filter .25s;
  animation:scrollFloat 5s ease-in-out infinite;
}
@keyframes scrollFloat{
  0%,100%{transform:translateY(0)}
  50%    {transform:translateY(-2px)}
}
@keyframes scrollPulse{0%,100%{opacity:.55}50%{opacity:.95}}
.scroll-pulse{animation:scrollPulse 2.5s ease-in-out infinite;}
.scroll-lbl{
  font-family:'Cinzel',serif;font-size:5.5px;
  color:rgba(120,232,255,0.60);letter-spacing:.8px;
  white-space:nowrap;
}
.scroll-btn:hover .scroll-lbl{color:var(--v6);}
body.cozy .scroll-svg{
  filter:hue-rotate(200deg) saturate(1.3) brightness(1.0) drop-shadow(0 0 5px rgba(200,140,40,0.40));
}
body.cozy .scroll-lbl{color:rgba(140,80,20,0.65);}
body.cozy .scroll-btn:hover .scroll-lbl{color:var(--v5);}

/* keep pulse-dot if used elsewhere */
.pulse-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--v4);box-shadow:0 0 5px var(--v3);
  animation:blink 2.5s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* compact inline progress pill */
.hdr-prog-bar{
  width:44px;height:2px;background:rgba(120,232,255,0.10);border-radius:2px;overflow:hidden;
}
.hdr-prog-fill{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,var(--v2),var(--v5));
  box-shadow:0 0 4px var(--vg);
  transition:width .8s cubic-bezier(.4,0,.2,1);width:0%;
}

/* ══════════════════════════════════════════════
   HERO
══════════════════════════════════════════════ */
.hero{
  position:relative;z-index:1;max-width:600px;margin:0 auto;
  padding:48px 24px 12px;text-align:center;
  animation:fadeUp .9s cubic-bezier(.34,1.1,.64,1) .06s both;
}
@keyframes fadeUp{from{transform:translateY(22px);opacity:0}to{transform:translateY(0);opacity:1}}

.hero-crest{display:flex;justify-content:center;margin-bottom:18px;position:relative}
.hero-crest svg,
.hero-crest #flame-hero{
  width:100px;height:136px;
  animation:heroLevitate 14s cubic-bezier(.45,.05,.55,.95) infinite;
  position:relative;z-index:1;
}
#hero-dust{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
  z-index:0;
  opacity:1;
}
@keyframes heroLevitate{
  0%   {transform:translateY(0px)  rotate(0deg);   filter:drop-shadow(0 0 10px rgba(20,144,216,.44)) drop-shadow(0 0 4px  rgba(120,232,255,.24))}
  20%  {transform:translateY(-3px) rotate(.15deg); filter:drop-shadow(0 0 16px rgba(20,144,216,.58)) drop-shadow(0 0 6px  rgba(120,232,255,.34))}
  50%  {transform:translateY(-9px) rotate(0deg);   filter:drop-shadow(0 0 30px rgba(20,144,216,.75)) drop-shadow(0 0 12px rgba(120,232,255,.48))}
  75%  {transform:translateY(-6px) rotate(-.15deg);filter:drop-shadow(0 0 18px rgba(20,144,216,.58)) drop-shadow(0 0 7px  rgba(120,232,255,.34))}
  100% {transform:translateY(0px)  rotate(0deg);   filter:drop-shadow(0 0 10px rgba(20,144,216,.44)) drop-shadow(0 0 4px  rgba(120,232,255,.24))}
}

/* BIG ASH — Cinzel Decorative, slow shimmer */
.hero-name{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(28px,7vw,52px);
  line-height:1.05;letter-spacing:10px;margin-bottom:6px;font-weight:700;
  background:linear-gradient(130deg,var(--v1) 0%,var(--v5) 35%,var(--v6) 52%,var(--v4) 72%,var(--v1) 100%);
  background-size:320% 100%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:violetShimmer 20s linear infinite;
}

.hero-tagline{
  font-family:'IM Fell English',serif;font-size:14px;font-style:italic;
  color:var(--t1);letter-spacing:.3px;margin-bottom:18px;line-height:1.6;
}
.hero-tagline em{font-style:normal;color:var(--v6);font-weight:400}
